<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eaglercraft Multi-Version Launcher</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1115;
      --panel: #171a21;
      --text: #e7ebf3;
      --subtle: #9ea9bf;
      --accent: #5f86ff;
      --accent2: #6dc8ff;
      --danger: #ff6b6b;
      --ok: #5dd39e;
      font-family: Inter, Segoe UI, Roboto, Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: linear-gradient(180deg, #0f1115 0%, #0d1220 100%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 12px;
      padding: 16px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid #23293a;
      border-radius: 12px;
      padding: 12px;
    }

    h1, h2 {
      margin: 0 0 8px;
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    p { margin: 0; color: var(--subtle); }

    .versions {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 14px;
    }

    .versionCard {
      padding: 10px;
      border: 1px solid #273149;
      border-radius: 10px;
      background: #131827;
    }

    .versionCard strong {
      display: inline-block;
      margin-bottom: 8px;
    }

    .versionCard .stack {
      display: grid;
      gap: 10px;
    }

    select, button, input[type="file"] {
      width: 100%;
      border: 1px solid #2e3956;
      background: #0f1524;
      color: var(--text);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 14px;
    }

    button {
      cursor: pointer;
      font-weight: 600;
      transition: transform .05s ease, border-color .2s ease;
    }

    button:hover { border-color: var(--accent2); }
    button:active { transform: translateY(1px); }

    .row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
      margin-top: 14px;
    }

    .primary {
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      color: #0b1222;
      border: 0;
    }

    .danger { border-color: #5a2525; color: #ffc6c6; }

    #status { margin-top: 8px; color: var(--ok); min-height: 1.3em; }

    iframe {
      width: 100%;
      height: 100%;
      min-height: 60vh;
      border: 1px solid #273149;
      border-radius: 12px;
      background: #020409;
    }

    code { color: #9fd3ff; }
  </style>
</head>
<body>
  <section class="panel">
    <h1>Eaglercraft Multi-Version Launcher</h1>
    <p>Use version dropdowns to launch clients, and save everything into named profiles (with isolated saves per HTML) so you can swap profiles or move them to another PC.</p>
  </section>

  <section class="panel">
    <h2>Launcher Controls</h2>
    <div class="row">
      <select id="profileSelect" aria-label="Saved launcher profiles"></select>
      <button id="newProfileBtn">Create profile</button>
      <button id="deleteProfileBtn" class="danger">Delete profile</button>
    </div>
    <div id="versionMenus" class="versions"></div>
    <div class="row">
      <button id="launchBtn" class="primary">Launch selected client</button>
      <button id="saveCurrentBtn">Save current profile snapshot</button>
      <button id="exportBtn">Export launcher save data</button>
      <input id="importFile" type="file" accept="application/json" />
      <button id="importBtn">Import launcher save data</button>
      <button id="resetBtn" class="danger">Reset selected profile</button>
    </div>
    <p id="activeClient"></p>
    <p id="status"></p>
  </section>

  <iframe id="gameFrame" title="Game launcher frame"></iframe>

  <script>
    const VERSION_FILES = {
      "1.5.2": [
        "OddFutureClient.html",
        "eaglercraft.1.5.2.html",
        "nitclient.html",
        "PrecisionClient.html",
        "fuchsiax.html"
      ],
      "1.8.8": {
        hacked: [
          "Hacked/DragonX_V2_International.html",
          "hacked/NitClient 2.0.html",
          "hacked/nit_client.html",
          "hacked/pi-client.html",
          "hacked/DragonX_V4.html",
          "hacked/UwUClient v1 Full.html",
          "hacked/Justin 1.2.4.html",
          "hacked/DragonXLite.html",
          "hacked/dragonXv3.html",
          "hacked/PremiumDragonv2.html",
          "hacked/DragonXShadow.html"
        ],
        legit: [
          "Legit/AstriaWASM.html",
          "Legit/AstriaJS.html",
          "Legit/EaglercraftX_1.8_WASM-GC_Offline_Download.html",
          "Legit/EaglercraftX_1.8_u53_Offline_Signed.html",
          "Legit/Astra Client 2, Pre-Alpha-02.html",
          "Legit/ResentClient_5.0_WASM.html",
          "legit/PixelClient 1.8.8 JS.html",
          "legit/PixelClient 1.8.8 WASM.html",
          "legit/EaglerReborn.html",
          "legit/shadowclient3.0beta.html"
        ],
        modded: [
          "Modded/Eaglerforge.html",
          "Modded/Eaglercraft_IR_StarLikeClient_0.4.2.html"
        ]
      },
      "1.12.2": [
        "PixelClient 1.12.2 JS.html",
        "TuffClient_1.12.2wasm.html",
        "TuffClient_1.12.2-JS.html",
        "Eaglercraft-1.12.2.html",
        "PixelClient 1.12.2 WASM.html",
        "Eaglercraft-1.12.2-WASM.html",
        "RadiantClient-1.1-WASM.html"
      ]
    };

    const CATEGORY_LABELS = {
      hacked: "Hacked clients",
      legit: "Legit clients",
      modded: "Modded clients"
    };

    const LAUNCHER_KEY = "launcherProfiles.v2";
    const LEGACY_LAUNCHER_KEY = "launcherProfiles.v1";
    const LAUNCHER_META_KEY = "launcherMeta.v1";

    const statusEl = document.getElementById("status");
    const activeClientEl = document.getElementById("activeClient");
    const frame = document.getElementById("gameFrame");
    const menusContainer = document.getElementById("versionMenus");
    const profileSelect = document.getElementById("profileSelect");

    const selects = {};
    const categorySelects = {};
    let activeClientPath = "";
    let activeVersion = Object.keys(VERSION_FILES)[0];

    function setStatus(message, isError = false) {
      statusEl.style.color = isError ? "#ff9a9a" : "#8de3b2";
      statusEl.textContent = message;
    }

    function getNonLauncherStorageSnapshot() {
      const snapshot = {};
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (!k || k === LAUNCHER_KEY || k === LEGACY_LAUNCHER_KEY || k === LAUNCHER_META_KEY) continue;
        snapshot[k] = localStorage.getItem(k);
      }
      return snapshot;
    }

    function clearNonLauncherStorage() {
      const toDelete = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (!k || k === LAUNCHER_KEY || k === LEGACY_LAUNCHER_KEY || k === LAUNCHER_META_KEY) continue;
        toDelete.push(k);
      }
      toDelete.forEach(k => localStorage.removeItem(k));
    }

    function emptyState() {
      return {
        activeProfile: "Default",
        profiles: {
          Default: { clients: {} }
        }
      };
    }

    function loadState() {
      try {
        const parsed = JSON.parse(localStorage.getItem(LAUNCHER_KEY) || "null");
        if (parsed && typeof parsed === "object" && parsed.profiles && parsed.activeProfile) {
          return parsed;
        }
      } catch {
        // fallthrough to migration/default
      }

      try {
        const legacy = JSON.parse(localStorage.getItem(LEGACY_LAUNCHER_KEY) || "null");
        if (legacy && typeof legacy === "object") {
          return {
            activeProfile: "Imported Legacy",
            profiles: {
              "Imported Legacy": { clients: legacy }
            }
          };
        }
      } catch {
        // fallthrough to default
      }

      return emptyState();
    }

    function saveState(state) {
      localStorage.setItem(LAUNCHER_KEY, JSON.stringify(state));
      localStorage.setItem(LAUNCHER_META_KEY, JSON.stringify({ updatedAt: new Date().toISOString() }));
    }

    function getActiveProfileName() {
      return profileSelect.value || loadState().activeProfile;
    }

    function getActiveProfile(state) {
      const profileName = state.activeProfile;
      if (!state.profiles[profileName]) {
        state.profiles[profileName] = { clients: {} };
      }
      return state.profiles[profileName];
    }

    function renderProfileMenu() {
      const state = loadState();
      const names = Object.keys(state.profiles);
      if (!names.length) {
        Object.assign(state, emptyState());
      }

      profileSelect.innerHTML = "";
      Object.keys(state.profiles).forEach((name) => {
        const option = document.createElement("option");
        option.value = name;
        option.textContent = name;
        profileSelect.appendChild(option);
      });
      profileSelect.value = state.activeProfile;
      saveState(state);
    }

    function saveCurrentProfileSnapshot() {
      if (!activeClientPath) {
        setStatus("No active client loaded yet. Launch one first.", true);
        return;
      }
      const state = loadState();
      state.activeProfile = getActiveProfileName();
      const profile = getActiveProfile(state);
      profile.clients[activeClientPath] = getNonLauncherStorageSnapshot();
      saveState(state);
      setStatus(`Saved snapshot for ${activeClientPath} in profile "${state.activeProfile}"`);
    }

    function applyProfile(clientPath) {
      const state = loadState();
      state.activeProfile = getActiveProfileName();
      const profile = getActiveProfile(state);
      const clientSave = profile.clients[clientPath] || {};
      clearNonLauncherStorage();
      Object.entries(clientSave).forEach(([k, v]) => localStorage.setItem(k, v));
      saveState(state);
    }

    function saveActiveProfileBeforeSwitch() {
      if (!activeClientPath) return;
      const state = loadState();
      state.activeProfile = getActiveProfileName();
      const profile = getActiveProfile(state);
      profile.clients[activeClientPath] = getNonLauncherStorageSnapshot();
      saveState(state);
    }

    function launchClient(clientPath) {
      saveActiveProfileBeforeSwitch();
      applyProfile(clientPath);
      activeClientPath = clientPath;
      frame.src = clientPath;
      activeClientEl.textContent = `Active client: ${clientPath}`;
      setStatus(`Launched ${clientPath} with isolated save profile.`);
    }

    function markVersionActive(version) {
      activeVersion = version;
      Object.entries(selects).forEach(([currentVersion, select]) => {
        select.dataset.active = currentVersion === version ? "true" : "false";
      });
    }

    function getCategoryFiles(version, category) {
      const grouped = VERSION_FILES[version];
      if (!grouped || Array.isArray(grouped)) return [];
      return grouped[category] || [];
    }

    function populateCategoryFiles(version) {
      const categorySelect = categorySelects[version];
      const fileSelect = selects[version];
      if (!categorySelect || !fileSelect) return;

      const files = getCategoryFiles(version, categorySelect.value);
      fileSelect.innerHTML = "";
      files.forEach((file) => {
        const option = document.createElement("option");
        option.value = file;
        option.textContent = file;
        fileSelect.appendChild(option);
      });
    }

    function selectedClientPath() {
      const version = activeVersion;
      const fileSelect = selects[version];
      const file = fileSelect?.value;
      return file ? `${version}/${file}` : "";
    }

    function renderVersionMenus() {
      Object.entries(VERSION_FILES).forEach(([version, data], index) => {
        const card = document.createElement("div");
        card.className = "versionCard";

        const title = document.createElement("strong");
        title.textContent = version;
        card.appendChild(title);

        const stack = document.createElement("div");
        stack.className = "stack";

        if (version === "1.8.8" && !Array.isArray(data)) {
          const categorySelect = document.createElement("select");
          Object.keys(data).forEach((category) => {
            const option = document.createElement("option");
            option.value = category;
            option.textContent = CATEGORY_LABELS[category] || category;
            categorySelect.appendChild(option);
          });
          categorySelects[version] = categorySelect;
          stack.appendChild(categorySelect);

          const clientSelect = document.createElement("select");
          selects[version] = clientSelect;
          stack.appendChild(clientSelect);

          categorySelect.addEventListener("change", () => {
            markVersionActive(version);
            populateCategoryFiles(version);
          });

          categorySelect.addEventListener("focus", () => markVersionActive(version));
          clientSelect.addEventListener("focus", () => markVersionActive(version));
          clientSelect.addEventListener("change", () => markVersionActive(version));

          populateCategoryFiles(version);
        } else {
          const select = document.createElement("select");
          data.forEach((file) => {
            const option = document.createElement("option");
            option.value = file;
            option.textContent = file;
            select.appendChild(option);
          });

          select.addEventListener("focus", () => markVersionActive(version));
          select.addEventListener("change", () => markVersionActive(version));

          selects[version] = select;
          stack.appendChild(select);
        }

        card.appendChild(stack);
        menusContainer.appendChild(card);
        if (index === 0) {
          markVersionActive(version);
        }
      });
    }

    document.getElementById("launchBtn").addEventListener("click", () => {
      const path = selectedClientPath();
      if (!path) {
        setStatus("No client is selected for the active version.", true);
        return;
      }
      launchClient(path);
    });

    document.getElementById("saveCurrentBtn").addEventListener("click", saveCurrentProfileSnapshot);

    profileSelect.addEventListener("change", () => {
      saveActiveProfileBeforeSwitch();
      const state = loadState();
      state.activeProfile = profileSelect.value;
      saveState(state);
      if (activeClientPath) {
        applyProfile(activeClientPath);
        frame.src = activeClientPath;
      }
      setStatus(`Switched to profile "${state.activeProfile}"`);
    });

    document.getElementById("newProfileBtn").addEventListener("click", () => {
      const requestedName = window.prompt("Enter a new profile name:");
      const name = requestedName?.trim();
      if (!name) {
        setStatus("Profile creation cancelled.", true);
        return;
      }
      const state = loadState();
      if (state.profiles[name]) {
        setStatus("A profile with that name already exists.", true);
        return;
      }
      saveActiveProfileBeforeSwitch();
      state.profiles[name] = { clients: {} };
      state.activeProfile = name;
      saveState(state);
      renderProfileMenu();
      if (activeClientPath) {
        applyProfile(activeClientPath);
        frame.src = activeClientPath;
      }
      setStatus(`Created profile "${name}"`);
    });

    document.getElementById("deleteProfileBtn").addEventListener("click", () => {
      const state = loadState();
      const names = Object.keys(state.profiles);
      if (names.length <= 1) {
        setStatus("Cannot delete the only remaining profile.", true);
        return;
      }
      const target = getActiveProfileName();
      delete state.profiles[target];
      state.activeProfile = Object.keys(state.profiles)[0];
      saveState(state);
      renderProfileMenu();
      if (activeClientPath) {
        applyProfile(activeClientPath);
        frame.src = activeClientPath;
      }
      setStatus(`Deleted profile "${target}"`);
    });

    document.getElementById("exportBtn").addEventListener("click", () => {
      saveActiveProfileBeforeSwitch();
      const payload = {
        exportedAt: new Date().toISOString(),
        state: loadState()
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "eagler-launcher-profiles.json";
      a.click();
      URL.revokeObjectURL(url);
      setStatus("Exported launcher save data.");
    });

    document.getElementById("importBtn").addEventListener("click", async () => {
      const file = document.getElementById("importFile").files?.[0];
      if (!file) {
        setStatus("Select a JSON export file first.", true);
        return;
      }
      try {
        const text = await file.text();
        const parsed = JSON.parse(text);
        if (!parsed || typeof parsed !== "object" || typeof parsed.state !== "object") {
          throw new Error("Invalid launcher export format");
        }
        saveState(parsed.state);
        renderProfileMenu();
        if (activeClientPath) {
          applyProfile(activeClientPath);
          frame.src = activeClientPath;
        }
        setStatus("Imported launcher save data.");
      } catch (err) {
        setStatus(`Import failed: ${err.message}`, true);
      }
    });

    document.getElementById("resetBtn").addEventListener("click", () => {
      const path = selectedClientPath();
      if (!path) {
        setStatus("No client is selected for the active version.", true);
        return;
      }
      const state = loadState();
      state.activeProfile = getActiveProfileName();
      const profile = getActiveProfile(state);
      delete profile.clients[path];
      saveState(state);
      if (activeClientPath === path) {
        clearNonLauncherStorage();
        frame.src = path;
      }
      setStatus(`Reset saved client data for ${path} in profile "${state.activeProfile}"`);
    });

    window.addEventListener("beforeunload", saveActiveProfileBeforeSwitch);

    renderProfileMenu();
    renderVersionMenus();
    activeClientEl.textContent = "Active client: none (choose version dropdown + launch)";
  </script>
</body>
</html>
