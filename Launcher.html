<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eaglercraft Multi-Version Launcher</title>
  <style>
    :root {
      color-scheme: dark;
      --panel: #171a21;
      --text: #e7ebf3;
      --subtle: #9ea9bf;
      --accent: #5f86ff;
      --accent2: #6dc8ff;
      --danger: #ff6b6b;
      --ok: #5dd39e;
      font-family: Inter, Segoe UI, Roboto, Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: linear-gradient(180deg, #0f1115 0%, #0d1220 100%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 12px;
      padding: 16px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid #23293a;
      border-radius: 12px;
      padding: 12px;
    }

    .creditBar {
      display: flex;
      justify-content: flex-start;
      align-items: center;
    }

    .credit {
      font-weight: 700;
      font-size: 18px;
      margin-top: 2px;
    }


    h1, h2 {
      margin: 0 0 8px;
      font-weight: 700;
      letter-spacing: 0.2px;
      text-align: center;
    }

    p { margin: 0; color: var(--subtle); }

    select, button, input[type="file"] {
      width: 100%;
      border: 1px solid #2e3956;
      background: #0f1524;
      color: var(--text);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 14px;
    }

    button {
      cursor: pointer;
      font-weight: 600;
      transition: transform .05s ease, border-color .2s ease;
    }

    button:hover { border-color: var(--accent2); }
    button:active { transform: translateY(1px); }

    .row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
      margin-top: 14px;
    }

    .middle {
      display: grid;
      justify-items: center;
      gap: 14px;
      margin-top: 16px;
    }

    .versionButtons {
      display: grid;
      gap: 10px;
      width: min(320px, 100%);
    }

    .versionBtn {
      background: #121a2b;
    }

    .versionBtn.active {
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      color: #0b1222;
      border-color: transparent;
    }

    .selectorStack {
      display: grid;
      gap: 10px;
      width: min(540px, 100%);
    }

    .primary {
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      color: #0b1222;
      border: 0;
    }

    .danger { border-color: #5a2525; color: #ffc6c6; }

    #status { margin-top: 10px; color: var(--ok); min-height: 1.3em; text-align: center; }
    #activeClient { text-align: center; }

    .frameControls {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 14px;
      margin-bottom: 12px;
    }

    #gameContainer {
      display: grid;
      gap: 10px;
    }

    iframe {
      width: 100%;
      height: 100%;
      min-height: 60vh;
      border: 1px solid #273149;
      border-radius: 12px;
      background: #020409;
    }

    .hidden { display: none; }
  </style>
</head>
<body>
  <section class="panel creditBar">
    <div class="credit">Made by Durdaking</div>
  </section>

  <section class="panel">
    <h1>Eaglercraft Multi-Version Launcher</h1>
    <h2>Launcher Controls</h2>

    <div class="row">
      <select id="profileSelect" aria-label="Saved launcher profiles"></select>
      <button id="newProfileBtn">Create profile</button>
      <button id="deleteProfileBtn" class="danger">Delete profile</button>
    </div>

    <div class="middle">
      <div id="versionButtons" class="versionButtons"></div>
      <div class="selectorStack">
        <select id="categorySelect" class="hidden" aria-label="1.8.8 client category"></select>
        <select id="clientSelect" aria-label="Client html selection"></select>
      </div>
    </div>

    <div class="row">
      <button id="launchBtn" class="primary">Launch selected client</button>
      <button id="resetBtn" class="danger">Reset selected profile</button>
    </div>

    <p id="activeClient"></p>
    <p id="status"></p>
  </section>

  <section id="gameContainer">
    <div class="frameControls">
      <button id="fullscreenBtn">Fullscreen game frame</button>
      <button id="newTabBtn">Launch selected client in new tab</button>
    </div>
    <iframe id="gameFrame" title="Game launcher frame"></iframe>
  </section>

  <script>
    const VERSION_FILES = {
      "1.12.2": [
        "PixelClient 1.12.2 JS.html",
        "TuffClient_1.12.2wasm.html",
        "TuffClient_1.12.2-JS.html",
        "Eaglercraft-1.12.2.html",
        "PixelClient 1.12.2 WASM.html",
        "Eaglercraft-1.12.2-WASM.html",
        "RadiantClient-1.1-WASM.html"
      ],
      "1.8.8": {
        hacked: [
          "Hacked/DragonX_V2_International.html",
          "hacked/NitClient 2.0.html",
          "hacked/nit_client.html",
          "hacked/pi-client.html",
          "hacked/DragonX_V4.html",
          "hacked/UwUClient v1 Full.html",
          "hacked/Justin 1.2.4.html",
          "hacked/DragonXLite.html",
          "hacked/dragonXv3.html",
          "hacked/PremiumDragonv2.html",
          "hacked/DragonXShadow.html"
        ],
        legit: [
          "Legit/AstriaWASM.html",
          "Legit/AstriaJS.html",
          "Legit/EaglercraftX_1.8_WASM-GC_Offline_Download.html",
          "Legit/EaglercraftX_1.8_u53_Offline_Signed.html",
          "Legit/Astra Client 2, Pre-Alpha-02.html",
          "Legit/ResentClient_5.0_WASM.html",
          "legit/PixelClient 1.8.8 JS.html",
          "legit/PixelClient 1.8.8 WASM.html",
          "legit/EaglerReborn.html",
          "legit/shadowclient3.0beta.html"
        ],
        modded: [
          "Modded/Eaglerforge.html",
          "Modded/Eaglercraft_IR_StarLikeClient_0.4.2.html"
        ]
      },
      "1.5.2": [
        "OddFutureClient.html",
        "eaglercraft.1.5.2.html",
        "nitclient.html",
        "PrecisionClient.html",
        "fuchsiax.html"
      ]
    };

    const CATEGORY_LABELS = {
      hacked: "Hacked clients",
      legit: "Legit clients",
      modded: "Modded clients"
    };

    const VERSION_ORDER = ["1.12.2", "1.8.8", "1.5.2"];

    const LAUNCHER_KEY = "launcherProfiles.v2";
    const LEGACY_LAUNCHER_KEY = "launcherProfiles.v1";
    const LAUNCHER_META_KEY = "launcherMeta.v1";

    const statusEl = document.getElementById("status");
    const activeClientEl = document.getElementById("activeClient");
    const frame = document.getElementById("gameFrame");
    const profileSelect = document.getElementById("profileSelect");
    const versionButtons = document.getElementById("versionButtons");
    const categorySelect = document.getElementById("categorySelect");
    const clientSelect = document.getElementById("clientSelect");
    const gameContainer = document.getElementById("gameContainer");

    let activeClientPath = "";
    let activeVersion = VERSION_ORDER[0];

    function setStatus(message, isError = false) {
      statusEl.style.color = isError ? "#ff9a9a" : "#8de3b2";
      statusEl.textContent = message;
    }

    function getNonLauncherStorageSnapshot() {
      const snapshot = {};
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (!k || k === LAUNCHER_KEY || k === LEGACY_LAUNCHER_KEY || k === LAUNCHER_META_KEY) continue;
        snapshot[k] = localStorage.getItem(k);
      }
      return snapshot;
    }

    function clearNonLauncherStorage() {
      const toDelete = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (!k || k === LAUNCHER_KEY || k === LEGACY_LAUNCHER_KEY || k === LAUNCHER_META_KEY) continue;
        toDelete.push(k);
      }
      toDelete.forEach((k) => localStorage.removeItem(k));
    }

    function emptyState() {
      return {
        activeProfile: "Default",
        profiles: {
          Default: { clients: {} }
        }
      };
    }

    function loadState() {
      try {
        const parsed = JSON.parse(localStorage.getItem(LAUNCHER_KEY) || "null");
        if (parsed && typeof parsed === "object" && parsed.profiles && parsed.activeProfile) {
          return parsed;
        }
      } catch {
        // fallthrough
      }

      try {
        const legacy = JSON.parse(localStorage.getItem(LEGACY_LAUNCHER_KEY) || "null");
        if (legacy && typeof legacy === "object") {
          return {
            activeProfile: "Imported Legacy",
            profiles: {
              "Imported Legacy": { clients: legacy }
            }
          };
        }
      } catch {
        // fallthrough
      }

      return emptyState();
    }

    function saveState(state) {
      localStorage.setItem(LAUNCHER_KEY, JSON.stringify(state));
      localStorage.setItem(LAUNCHER_META_KEY, JSON.stringify({ updatedAt: new Date().toISOString() }));
    }

    function getActiveProfileName() {
      return profileSelect.value || loadState().activeProfile;
    }

    function getActiveProfile(state) {
      const profileName = state.activeProfile;
      if (!state.profiles[profileName]) {
        state.profiles[profileName] = { clients: {} };
      }
      return state.profiles[profileName];
    }

    function renderProfileMenu() {
      const state = loadState();
      const names = Object.keys(state.profiles);
      if (!names.length) {
        Object.assign(state, emptyState());
      }

      profileSelect.innerHTML = "";
      Object.keys(state.profiles).forEach((name) => {
        const option = document.createElement("option");
        option.value = name;
        option.textContent = name;
        profileSelect.appendChild(option);
      });
      profileSelect.value = state.activeProfile;
      saveState(state);
    }

    function displayClientName(filePath) {
      return filePath.split("/").pop() || filePath;
    }

    function getSelectedClientPath() {
      const file = clientSelect.value;
      return file ? `${activeVersion}/${file}` : "";
    }

    function resolveClientUrl(clientPath) {
      return new URL(clientPath, window.location.href).href;
    }

    function populateCategorySelect() {
      categorySelect.innerHTML = "";
      const grouped = VERSION_FILES["1.8.8"];
      Object.keys(grouped).forEach((category) => {
        const option = document.createElement("option");
        option.value = category;
        option.textContent = CATEGORY_LABELS[category] || category;
        categorySelect.appendChild(option);
      });
    }

    function populateClientSelect() {
      clientSelect.innerHTML = "";
      let files = [];

      if (activeVersion === "1.8.8") {
        const grouped = VERSION_FILES["1.8.8"];
        files = grouped[categorySelect.value] || [];
      } else {
        files = VERSION_FILES[activeVersion] || [];
      }

      files.forEach((file) => {
        const option = document.createElement("option");
        option.value = file;
        option.textContent = displayClientName(file);
        clientSelect.appendChild(option);
      });
    }

    function setActiveVersion(version) {
      activeVersion = version;
      [...versionButtons.querySelectorAll("button")].forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.version === version);
      });

      if (version === "1.8.8") {
        categorySelect.classList.remove("hidden");
      } else {
        categorySelect.classList.add("hidden");
      }

      populateClientSelect();
      setStatus(`Selected version ${version}`);
    }

    function renderVersionButtons() {
      versionButtons.innerHTML = "";
      VERSION_ORDER.forEach((version) => {
        const button = document.createElement("button");
        button.className = "versionBtn";
        button.dataset.version = version;
        button.textContent = version;
        button.addEventListener("click", () => setActiveVersion(version));
        versionButtons.appendChild(button);
      });
      setActiveVersion(VERSION_ORDER[0]);
    }

    function applyProfile(clientPath) {
      const state = loadState();
      state.activeProfile = getActiveProfileName();
      const profile = getActiveProfile(state);
      const clientSave = profile.clients[clientPath] || {};
      clearNonLauncherStorage();
      Object.entries(clientSave).forEach(([k, v]) => localStorage.setItem(k, v));
      saveState(state);
    }

    function saveActiveProfileBeforeSwitch() {
      if (!activeClientPath) return;
      const state = loadState();
      state.activeProfile = getActiveProfileName();
      const profile = getActiveProfile(state);
      profile.clients[activeClientPath] = getNonLauncherStorageSnapshot();
      saveState(state);
    }

    function launchClient(clientPath) {
      const resolvedUrl = resolveClientUrl(clientPath);
      saveActiveProfileBeforeSwitch();
      applyProfile(clientPath);
      activeClientPath = clientPath;
      frame.src = "about:blank";
      requestAnimationFrame(() => {
        frame.src = resolvedUrl;
      });
      activeClientEl.textContent = `Active client: ${clientPath}`;
      setStatus(`Launched ${clientPath} with isolated save profile.`);
    }

    function openClientInNewTab(clientPath) {
      const resolvedUrl = resolveClientUrl(clientPath);
      saveActiveProfileBeforeSwitch();
      applyProfile(clientPath);
      activeClientPath = clientPath;
      const win = window.open(resolvedUrl, "_blank", "noopener");
      if (!win) {
        setStatus("Popup blocked. Allow popups for this page to launch in a new tab.", true);
        return;
      }
      activeClientEl.textContent = `Active client: ${clientPath}`;
      setStatus(`Opened ${clientPath} in a new tab.`);
    }

    document.getElementById("launchBtn").addEventListener("click", () => {
      const path = getSelectedClientPath();
      if (!path) {
        setStatus("No client is selected for this version.", true);
        return;
      }
      launchClient(path);
    });

    document.getElementById("newTabBtn").addEventListener("click", () => {
      const path = getSelectedClientPath();
      if (!path) {
        setStatus("No client is selected for this version.", true);
        return;
      }
      openClientInNewTab(path);
    });

    document.getElementById("fullscreenBtn").addEventListener("click", async () => {
      try {
        if (document.fullscreenElement) {
          await document.exitFullscreen();
          setStatus("Exited fullscreen mode.");
          return;
        }
        await gameContainer.requestFullscreen();
        setStatus("Entered fullscreen mode.");
      } catch (err) {
        setStatus(`Fullscreen failed: ${err.message}`, true);
      }
    });

    document.getElementById("resetBtn").addEventListener("click", () => {
      const path = getSelectedClientPath();
      if (!path) {
        setStatus("No client is selected for this version.", true);
        return;
      }
      const state = loadState();
      state.activeProfile = getActiveProfileName();
      const profile = getActiveProfile(state);
      delete profile.clients[path];
      saveState(state);
      if (activeClientPath === path) {
        clearNonLauncherStorage();
        frame.src = resolveClientUrl(path);
      }
      setStatus(`Reset saved client data for ${path} in profile "${state.activeProfile}"`);
    });

    profileSelect.addEventListener("change", () => {
      saveActiveProfileBeforeSwitch();
      const state = loadState();
      state.activeProfile = profileSelect.value;
      saveState(state);
      if (activeClientPath) {
        applyProfile(activeClientPath);
        frame.src = resolveClientUrl(activeClientPath);
      }
      setStatus(`Switched to profile "${state.activeProfile}"`);
    });

    document.getElementById("newProfileBtn").addEventListener("click", () => {
      const requestedName = window.prompt("Enter a new profile name:");
      const name = requestedName?.trim();
      if (!name) {
        setStatus("Profile creation cancelled.", true);
        return;
      }
      const state = loadState();
      if (state.profiles[name]) {
        setStatus("A profile with that name already exists.", true);
        return;
      }
      saveActiveProfileBeforeSwitch();
      state.profiles[name] = { clients: {} };
      state.activeProfile = name;
      saveState(state);
      renderProfileMenu();
      if (activeClientPath) {
        applyProfile(activeClientPath);
        frame.src = resolveClientUrl(activeClientPath);
      }
      setStatus(`Created profile "${name}"`);
    });

    document.getElementById("deleteProfileBtn").addEventListener("click", () => {
      const state = loadState();
      const names = Object.keys(state.profiles);
      if (names.length <= 1) {
        setStatus("Cannot delete the only remaining profile.", true);
        return;
      }
      const target = getActiveProfileName();
      delete state.profiles[target];
      state.activeProfile = Object.keys(state.profiles)[0];
      saveState(state);
      renderProfileMenu();
      if (activeClientPath) {
        applyProfile(activeClientPath);
        frame.src = resolveClientUrl(activeClientPath);
      }
      setStatus(`Deleted profile "${target}"`);
    });

    categorySelect.addEventListener("change", populateClientSelect);
    window.addEventListener("beforeunload", saveActiveProfileBeforeSwitch);

    renderProfileMenu();
    populateCategorySelect();
    renderVersionButtons();
    activeClientEl.textContent = "Active client: none (select a version button + launch)";
  </script>
</body>
</html>
