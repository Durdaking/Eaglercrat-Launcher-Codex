<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Eaglercraft Multi-Version Launcher</title>

<style>
:root{
  color-scheme: dark;
  --panel:#171a21;
  --text:#e7ebf3;
  --subtle:#9ea9bf;
  --accent:#9b5cff;
  --accent2:#bf80ff;
  --danger:#62a0ff;
  --ok:#5dd39e;
  font-family: Inter, Segoe UI, Roboto, Arial, sans-serif;
}

*{box-sizing:border-box;}

body{
  margin:0;
  background:linear-gradient(rgba(11,10,22,.72),rgba(8,8,18,.8)),url("background.svg") center/cover fixed no-repeat;
  color:var(--text);
  min-height:100vh;
  padding:16px;
}

.panel{
  background:var(--panel);
  border:1px solid #23293a;
  border-radius:12px;
  padding:16px;
  margin-bottom:16px;
}

h1,h2{text-align:center;margin:0 0 10px;}

button,select,input[type=file]{
  width:100%;
  border:1px solid #2e3956;
  background:#0f1524;
  color:var(--text);
  border-radius:8px;
  padding:8px 10px;
  font-size:14px;
}

button{
  cursor:pointer;
  font-weight:600;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  border:0;
}

button.danger{
  background:linear-gradient(90deg,#4d87ff,#72a7ff);
}

.versionButtons{
  display:grid;
  gap:8px;
  margin-top:10px;
}

.versionBtn.active{
  outline:2px solid white;
}

.hidden{display:none;}

#status{
  margin-top:12px;
  text-align:center;
  min-height:1.4em;
}

</style>
</head>
<body>

<div class="panel">
<h1>Eaglercraft Multi-Version Launcher</h1>

<select id="profileSelect"></select>
<div style="margin-top:8px; display:flex; gap:6px;">
<button id="newProfileBtn">Create</button>
<button id="deleteProfileBtn" class="danger">Delete</button>
</div>

<h2 style="margin-top:20px;">Versions</h2>
<div id="versionButtons" class="versionButtons"></div>

<select id="categorySelect" class="hidden"></select>
<select id="clientSelect" style="margin-top:8px;"></select>

<div style="margin-top:14px;">
<button id="launchBtn">Play Selected Client</button>
</div>

<div style="margin-top:10px;">
<button id="backgroundBtn">Upload Background</button>
<input type="file" id="backgroundFile" class="hidden" accept="image/*">
</div>

<div style="margin-top:6px;">
<button id="skinBtn">Upload Skin</button>
<input type="file" id="skinFile" class="hidden" accept="image/*">
</div>

<div style="margin-top:10px;">
<button id="exportBtn">Export All Data</button>
<button id="importBtn">Import Data</button>
<input type="file" id="importFile" class="hidden" accept="application/json">
</div>

<p id="status"></p>
</div>

<script>
const VERSION_FILES={
"1.12.2":["Eaglercraft-1.12.2.html"],
"1.8.8":{
  hacked:["hacked/NitClient.html"],
  legit:["legit/Eaglercraft.html"],
  modded:["modded/Eaglerforge.html"]
},
"1.5.2":["eaglercraft.1.5.2.html"]
};

const STORAGE_KEY="launcherProfiles.v3";
let activeVersion="1.12.2";
let activeClient="";

function loadState(){
  return JSON.parse(localStorage.getItem(STORAGE_KEY)||"null")||{
    activeProfile:"Default",
    profiles:{
      Default:{clients:{},background:null,skin:null}
    }
  };
}

function saveState(s){
  localStorage.setItem(STORAGE_KEY,JSON.stringify(s));
}

function getProfile(s){
  return s.profiles[s.activeProfile];
}

function setStatus(msg,error=false){
  document.getElementById("status").style.color=error?"#ff9a9a":"#8de3b2";
  document.getElementById("status").textContent=msg;
}

function renderProfiles(){
  const s=loadState();
  const sel=document.getElementById("profileSelect");
  sel.innerHTML="";
  Object.keys(s.profiles).forEach(name=>{
    const o=document.createElement("option");
    o.value=name;
    o.textContent=name;
    sel.appendChild(o);
  });
  sel.value=s.activeProfile;
}

function renderVersions(){
  const container=document.getElementById("versionButtons");
  container.innerHTML="";
  Object.keys(VERSION_FILES).forEach(v=>{
    const b=document.createElement("button");
    b.textContent=v;
    b.className="versionBtn";
    if(v===activeVersion)b.classList.add("active");
    b.onclick=()=>{activeVersion=v;renderVersions();populateClients();};
    container.appendChild(b);
  });
}

function populateClients(){
  const catSel=document.getElementById("categorySelect");
  const clientSel=document.getElementById("clientSelect");
  clientSel.innerHTML="";
  if(activeVersion==="1.8.8"){
    catSel.classList.remove("hidden");
    catSel.innerHTML="";
    Object.keys(VERSION_FILES["1.8.8"]).forEach(cat=>{
      const o=document.createElement("option");
      o.value=cat;
      o.textContent=cat;
      catSel.appendChild(o);
    });
    const firstCat=catSel.value;
    VERSION_FILES["1.8.8"][firstCat].forEach(file=>{
      const o=document.createElement("option");
      o.value=file;
      o.textContent=file;
      clientSel.appendChild(o);
    });
  }else{
    catSel.classList.add("hidden");
    VERSION_FILES[activeVersion].forEach(file=>{
      const o=document.createElement("option");
      o.value=file;
      o.textContent=file;
      clientSel.appendChild(o);
    });
  }
}

function applyBackground(profile){
  if(!profile.background){
    document.body.style.background="";
    return;
  }
  document.body.style.background=
    `linear-gradient(rgba(12,16,26,.72),rgba(8,12,20,.82)),url(${profile.background}) center/cover fixed no-repeat`;
}

function applySkin(profile){
  if(profile.skin){
    localStorage.setItem("eaglercraft.skin.custom",profile.skin);
  }
}

document.getElementById("launchBtn").onclick=()=>{
  const client=document.getElementById("clientSelect").value;
  if(!client)return setStatus("Select a client first",true);
  activeClient=client;
  const s=loadState();
  const p=getProfile(s);
  applySkin(p);
  applyBackground(p);
  window.open(client,"_blank");
};

document.getElementById("newProfileBtn").onclick=()=>{
  const name=prompt("Profile name?");
  if(!name)return;
  const s=loadState();
  if(s.profiles[name])return setStatus("Profile exists",true);
  s.profiles[name]={clients:{},background:null,skin:null};
  s.activeProfile=name;
  saveState(s);
  renderProfiles();
};

document.getElementById("deleteProfileBtn").onclick=()=>{
  const s=loadState();
  if(Object.keys(s.profiles).length<=1)
    return setStatus("Cannot delete last profile",true);
  delete s.profiles[s.activeProfile];
  s.activeProfile=Object.keys(s.profiles)[0];
  saveState(s);
  renderProfiles();
};

document.getElementById("profileSelect").onchange=e=>{
  const s=loadState();
  s.activeProfile=e.target.value;
  saveState(s);
  applyBackground(getProfile(s));
};

document.getElementById("backgroundBtn").onclick=()=>backgroundFile.click();
backgroundFile.onchange=async()=>{
  const file=backgroundFile.files[0];
  if(!file)return;
  const data=await fileToDataURL(file);
  const s=loadState();
  getProfile(s).background=data;
  saveState(s);
  applyBackground(getProfile(s));
  setStatus("Background saved");
};

document.getElementById("skinBtn").onclick=()=>skinFile.click();
skinFile.onchange=async()=>{
  const file=skinFile.files[0];
  if(!file)return;
  const data=await fileToDataURL(file);
  const s=loadState();
  getProfile(s).skin=data;
  saveState(s);
  setStatus("Skin saved");
};

document.getElementById("exportBtn").onclick=()=>{
  const blob=new Blob([JSON.stringify(loadState(),null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="launcher-data.json";
  a.click();
};

document.getElementById("importBtn").onclick=()=>importFile.click();
importFile.onchange=async()=>{
  const text=await importFile.files[0].text();
  localStorage.setItem(STORAGE_KEY,text);
  renderProfiles();
  setStatus("Data imported");
};

function fileToDataURL(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result);
    r.onerror=rej;
    r.readAsDataURL(file);
  });
}

renderProfiles();
renderVersions();
populateClients();
applyBackground(getProfile(loadState()));
</script>

</body>
</html>
