<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eaglercraft Launcher</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #2a2a2a, #111);
    }

    .launcher {
      width: min(680px, 92vw);
      background: #1a1a1a;
      border: 1px solid #353535;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 12px;
      text-align: center;
      font-size: 1.6rem;
    }

    p {
      margin: 0 0 20px;
      text-align: center;
      color: #c6c6c6;
    }

    .buttons {
      display: grid;
      gap: 12px;
    }

    button {
      width: 100%;
      padding: 14px 16px;
      font-size: 1rem;
      color: #fff;
      background: linear-gradient(180deg, #3b78e7, #2c61c9);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.08s ease, filter 0.2s ease;
    }

    button:hover {
      filter: brightness(1.1);
    }

    button:active {
      transform: translateY(1px);
    }
  </style>
</head>
<body>
  <main class="launcher">
    <h1>Eaglercraft HTML Launcher</h1>
    <p>Click a button to open that specific HTML client.</p>
    <section class="buttons" id="buttonContainer"></section>
  </main>

  <script>
    const htmlFiles = [
      "Eaglercraft-1.12.2-WASM.html",
      "PixelClient 1.12.2 WASM.html",
      "RadiantClient-1.1-WASM.html"
    ];

    const buttonContainer = document.getElementById("buttonContainer");

    htmlFiles.forEach((fileName) => {
      const button = document.createElement("button");
      button.type = "button";
      button.textContent = fileName;
      button.addEventListener("click", () => {
        window.location.href = fileName;
      });
      buttonContainer.appendChild(button);
    });
  </script>
</body>
</html>
