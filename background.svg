<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Moon on dark sky background">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#081020"/>
      <stop offset="100%" stop-color="#02040b"/>
    </radialGradient>
    <radialGradient id="moon" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#f1f3f7"/>
      <stop offset="100%" stop-color="#bec5d0"/>
    </radialGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <g fill="#d8dfeb" opacity="0.9">
    <circle cx="200" cy="100" r="1.3"/><circle cx="320" cy="240" r="1.1"/><circle cx="460" cy="80" r="1.4"/>
    <circle cx="600" cy="180" r="1.2"/><circle cx="740" cy="140" r="1.5"/><circle cx="930" cy="110" r="1.2"/>
    <circle cx="1110" cy="70" r="1.4"/><circle cx="1250" cy="190" r="1.2"/><circle cx="1430" cy="120" r="1.5"/>
    <circle cx="150" cy="320" r="1.2"/><circle cx="380" cy="390" r="1.1"/><circle cx="520" cy="290" r="1.3"/>
    <circle cx="1330" cy="320" r="1.2"/><circle cx="1470" cy="260" r="1.3"/>
  </g>

  <g filter="url(#softGlow)">
    <circle cx="800" cy="380" r="220" fill="url(#moon)"/>
    <g fill="#aab1bc" opacity="0.65">
      <circle cx="730" cy="320" r="24"/><circle cx="855" cy="300" r="28"/><circle cx="900" cy="400" r="22"/>
      <circle cx="760" cy="430" r="30"/><circle cx="820" cy="510" r="18"/><circle cx="690" cy="380" r="17"/>
      <circle cx="880" cy="470" r="14"/><circle cx="960" cy="350" r="16"/><circle cx="790" cy="360" r="12"/>
    </g>
  </g>
</svg>
