<!DOCTYPE html>
<html>
<head>
    <title>Eaglercraft Offline Launcher</title>
    <style>
        body {
            margin: 0;
            background: #111;
            color: white;
            font-family: Arial;
            text-align: center;
        }

        #menu {
            padding: 20px;
        }

        button {
            padding: 8px 18px;
            margin: 4px;
            border: none;
            border-radius: 6px;
            background: #4CAF50;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #3e8e41;
        }

        #controls {
            display: none;
            padding: 10px;
            background: #222;
        }

        #gameFrame {
            width: 100%;
            height: 85vh;
            border: none;
            display: none;
        }

        .danger {
            background: #d9534f;
        }

        .blue {
            background: #0275d8;
        }

        .purple {
            background: #6f42c1;
        }
    </style>
</head>
<body>

<div id="menu">
    <h1>Eaglercraft Offline Launcher</h1>

    <h2>1.8.8 - Legit</h2>
    <button onclick="launch('./1.8.8/Legit/AstrialJS.html')">Astrial JS</button>

    <h2>1.12.2</h2>
    <button onclick="launch('./1.12.2/Eaglercraft-1.12.2-WASM.html')">Vanilla WASM</button>
</div>

<div id="controls">
    <button class="blue" onclick="goFullscreen()">Fullscreen</button>
    <button class="purple" onclick="openNewTab()">Open in New Tab</button>
    <button class="danger" onclick="goBack()">Back to Menu</button>
</div>

<iframe id="gameFrame"></iframe>

<script>

let currentPath = "";

function launch(path) {
    currentPath = path;
    document.getElementById("menu").style.display = "none";
    document.getElementById("gameFrame").style.display = "block";
    document.getElementById("controls").style.display = "block";
    document.getElementById("gameFrame").src = path;
}

function goBack() {
    document.getElementById("gameFrame").src = "";
    document.getElementById("gameFrame").style.display = "none";
    document.getElementById("menu").style.display = "block";
    document.getElementById("controls").style.display = "none";
}

function openNewTab() {
    if (currentPath !== "") {
        window.open(currentPath, "_blank");
    }
}

function goFullscreen() {
    let iframe = document.getElementById("gameFrame");
    if (iframe.requestFullscreen) {
        iframe.requestFullscreen();
    } else if (iframe.webkitRequestFullscreen) {
        iframe.webkitRequestFullscreen();
    } else if (iframe.msRequestFullscreen) {
        iframe.msRequestFullscreen();
    }
}

</script>

</body>
</html>
