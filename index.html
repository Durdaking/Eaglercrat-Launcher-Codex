<!DOCTYPE html>
<html>
<head>
<title>Eaglercraft Offline Launcher</title>
<style>
body { margin:0; font-family:Arial; background:#111; color:white; }

#sidebar {
    position:fixed;
    left:0;
    top:0;
    width:270px;
    height:100%;
    background:#1a1a1a;
    overflow-y:auto;
    padding:15px;
}

#sidebar h2 {
    margin-top:20px;
    cursor:pointer;
}

.client-btn {
    display:block;
    width:100%;
    margin:3px 0;
    padding:6px;
    background:#333;
    border:none;
    color:white;
    text-align:left;
    border-radius:4px;
    cursor:pointer;
}

.client-btn:hover { background:#4CAF50; }

#main {
    margin-left:270px;
    height:100vh;
    display:flex;
    flex-direction:column;
}

#controls {
    background:#222;
    padding:8px;
    display:none;
}

.control-btn {
    padding:6px 12px;
    margin-right:6px;
    border:none;
    border-radius:4px;
    cursor:pointer;
    color:white;
}

.full { background:#0275d8; }
.newtab { background:#6f42c1; }
.back { background:#d9534f; }

#gameFrame {
    flex:1;
    border:none;
    display:none;
}
</style>
</head>
<body>

<div id="sidebar">
<h1>Eaglercraft</h1>

<h2 onclick="toggle('v152')">1.5.2 ▼</h2>
<div id="v152">
<button class="client-btn" onclick="launch('./1.5.2/OddFutureClient.html')">OddFutureClient</button>
<button class="client-btn" onclick="launch('./1.5.2/PrecisionClient.html')">PrecisionClient</button>
<button class="client-btn" onclick="launch('./1.5.2/eaglercraft.1.5.2.html')">Vanilla 1.5.2</button>
<button class="client-btn" onclick="launch('./1.5.2/fuchsiax.html')">fuchsiax</button>
<button class="client-btn" onclick="launch('./1.5.2/nitclient.html')">nitclient</button>
</div>

<h2 onclick="toggle('v188')">1.8.8 ▼</h2>
<div id="v188">

<h3>Legit</h3>
<button class="client-btn" onclick="launch('./1.8.8/Legit/Astra Client 2, Pre-Alpha-02.html')">Astra Client 2</button>
<button class="client-btn" onclick="launch('./1.8.8/Legit/AstrialJS.html')">AstrialJS</button>
<button class="client-btn" onclick="launch('./1.8.8/Legit/AstriaWASM.html')">AstriaWASM</button>
<button class="client-btn" onclick="launch('./1.8.8/Legit/EaglercraftX_1.8_WASM-GC_Offline_Signed.html')">EaglercraftX WASM-GC</button>
<button class="client-btn" onclick="launch('./1.8.8/Legit/EaglercraftX_1.8_u53_Offline_Signed.html')">EaglercraftX u53</button>
<button class="client-btn" onclick="launch('./1.8.8/Legit/ResentClient_5.0_WASM.html')">ResentClient 5.0</button>

<h3>Hacked</h3>
<button class="client-btn" onclick="launch('./1.8.8/Hacked/DragonX_V2_International.html')">DragonX V2 International</button>

<h3>Modded</h3>
<button class="client-btn" onclick="launch('./1.8.8/Modded/Eaglercraft_IR_StarLikeClient_Offline.html')">StarLikeClient</button>
<button class="client-btn" onclick="launch('./1.8.8/Modded/Eaglerforge.html')">Eaglerforge</button>

</div>

<h2 onclick="toggle('v1122')">1.12.2 ▼</h2>
<div id="v1122">
<button class="client-btn" onclick="launch('./1.12.2/Eaglercraft-1.12.2-WASM.html')">Vanilla WASM</button>
<button class="client-btn" onclick="launch('./1.12.2/Eaglercraft-1.12.2.html')">Vanilla JS</button>
<button class="client-btn" onclick="launch('./1.12.2/PixelClient 1.12.2 JS.html')">PixelClient JS</button>
<button class="client-btn" onclick="launch('./1.12.2/PixelClient 1.12.2 WASM.html')">PixelClient WASM</button>
<button class="client-btn" onclick="launch('./1.12.2/RadiantClient-1.1-WASM.html')">RadiantClient</button>
<button class="client-btn" onclick="launch('./1.12.2/TuffClient_1.12.2-JS.html')">TuffClient JS</button>
<button class="client-btn" onclick="launch('./1.12.2/TuffClient_1.12.2wasm.html')">TuffClient WASM</button>
</div>

</div>

<div id="main">
<div id="controls">
<button class="control-btn full" onclick="fullscreenGame()">Fullscreen</button>
<button class="control-btn newtab" onclick="openNewTab()">Open in New Tab</button>
<button class="control-btn back" onclick="goBack()">Back</button>
</div>

<iframe id="gameFrame"></iframe>
</div>

<script>
let currentPath = "";

function launch(path){
    currentPath = path;
    document.getElementById("gameFrame").src = path;
    document.getElementById("gameFrame").style.display = "block";
    document.getElementById("controls").style.display = "block";
}

function goBack(){
    document.getElementById("gameFrame").src = "";
    document.getElementById("gameFrame").style.display = "none";
    document.getElementById("controls").style.display = "none";
}

function openNewTab(){
    if(currentPath !== "") window.open(currentPath, "_blank");
}

function fullscreenGame(){
    let iframe = document.getElementById("gameFrame");
    if(iframe.requestFullscreen) iframe.requestFullscreen();
}

function toggle(id){
    let el = document.getElementById(id);
    el.style.display = el.style.display === "none" ? "block" : "none";
}
</script>

</body>
</html>
