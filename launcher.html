<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eaglercraft Launcher</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

:root {
  --bg:         #0a0514;
  --bg2:        #0d0720;
  --panel:      rgba(20, 8, 50, 0.93);
  --panel2:     rgba(30, 10, 70, 0.85);
  --border:     rgba(140, 60, 255, 0.22);
  --border-h:   rgba(200, 100, 255, 0.7);
  --purple:     #9c27b0;
  --violet:     #7c4dff;
  --pink:       #e040fb;
  --lavender:   #ce93d8;
  --muted:      #9e79c8;
  --text:       #f0e6ff;
  --dim:        #6a4a8a;

  --wasm-bg:    rgba(105, 240, 174, 0.1);
  --wasm-fg:    #69f0ae;
  --wasm-bdr:   rgba(105, 240, 174, 0.3);
  --js-bg:      rgba(255, 214, 0, 0.08);
  --js-fg:      #ffd600;
  --js-bdr:     rgba(255, 214, 0, 0.3);
  --unk-bg:     rgba(120, 100, 160, 0.12);
  --unk-fg:     #b0a0d4;
  --unk-bdr:    rgba(140, 110, 180, 0.28);

  --legit-bg:   rgba(180, 100, 255, 0.1);
  --legit-fg:   #c080ff;
  --legit-bdr:  rgba(180, 100, 255, 0.3);
  --hacked-bg:  rgba(255, 60, 100, 0.08);
  --hacked-fg:  #ff5070;
  --hacked-bdr: rgba(255, 60, 100, 0.28);
  --modded-bg:  rgba(224, 64, 251, 0.08);
  --modded-fg:  #e040fb;
  --modded-bdr: rgba(224, 64, 251, 0.28);

  --sidebar-w:  272px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Share Tech Mono', 'Courier New', monospace;
  min-height: 100vh;
  display: flex;
  overflow-x: hidden;
}

.bg-grid {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    linear-gradient(rgba(120,40,220,0.07) 1px, transparent 1px),
    linear-gradient(90deg, rgba(120,40,220,0.07) 1px, transparent 1px);
  background-size: 44px 44px;
}
.bg-glow {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 65% 45% at 10% 5%,  rgba(100,20,200,0.2)  0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 90% 90%,  rgba(180,30,220,0.13) 0%, transparent 60%),
    radial-gradient(ellipse 40% 30% at 50% 50%,  rgba(80,0,160,0.07)   0%, transparent 70%);
}
.bg-scan {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.05) 2px,rgba(0,0,0,0.05) 4px);
}

/* ══ SIDEBAR ══ */
.sidebar {
  position: fixed;
  left: 0; top: 0; bottom: 0;
  width: var(--sidebar-w);
  background: rgba(8,3,22,0.97);
  border-right: 1px solid rgba(140,60,255,0.18);
  z-index: 100;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  overflow-x: hidden;
  box-shadow: 4px 0 24px rgba(100,20,200,0.15);
}

.sidebar-header {
  padding: 26px 18px 18px;
  border-bottom: 1px solid rgba(140,60,255,0.12);
  text-align: center;
  flex-shrink: 0;
}
.sidebar-logo {
  font-family: 'Orbitron', monospace;
  font-size: 14px;
  font-weight: 900;
  letter-spacing: 5px;
  color: var(--pink);
  text-shadow: 0 0 14px rgba(224,64,251,0.7), 0 0 36px rgba(224,64,251,0.3);
  animation: flicker 9s infinite;
}
.sidebar-sub {
  font-size: 8px;
  letter-spacing: 4px;
  color: var(--dim);
  margin-top: 5px;
  text-transform: uppercase;
}

@keyframes flicker {
  0%,91%,100%{opacity:1} 92%{opacity:.55} 94%{opacity:1} 97%{opacity:.25} 97.5%{opacity:1}
}

.sidebar-nav { flex: 1; padding: 8px 0 16px; }

.nav-group { margin-bottom: 2px; }

.nav-ver-btn {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  background: none;
  border: none;
  border-left: 2px solid transparent;
  color: var(--lavender);
  font-family: 'Orbitron', monospace;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  cursor: pointer;
  transition: background .14s, color .14s, border-color .14s;
  text-align: left;
}
.nav-ver-btn:hover { background: rgba(180,60,255,0.07); color: var(--pink); border-left-color: rgba(224,64,251,0.4); }
.nav-ver-btn.open  { background: rgba(180,60,255,0.1); color: var(--pink); border-left-color: var(--pink); text-shadow: 0 0 8px rgba(224,64,251,0.4); }
.nav-ver-btn .chevron { font-size: 7px; transition: transform .2s; opacity:.5; }
.nav-ver-btn.open .chevron { transform: rotate(90deg); }

.nav-clients { overflow: hidden; max-height: 0; transition: max-height .28s ease; }
.nav-clients.open { max-height: 800px; }

.nav-sub-label {
  font-size: 8px;
  letter-spacing: 3px;
  color: var(--dim);
  text-transform: uppercase;
  padding: 8px 20px 3px;
  opacity: .65;
}

.nav-client-btn {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 16px 7px 22px;
  background: none;
  border: none;
  border-left: 2px solid transparent;
  color: #c0a8e8;
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  cursor: pointer;
  text-align: left;
  transition: background .12s, color .12s, border-color .12s;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.nav-client-btn:hover { background: rgba(160,60,255,0.09); color: var(--text); border-left-color: var(--violet); }
.nav-client-btn.active { background: rgba(180,60,255,0.17); color: var(--pink); border-left-color: var(--pink); text-shadow: 0 0 6px rgba(224,64,251,0.4); }
.nav-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; background: var(--dim); transition: background .14s; }
.nav-client-btn:hover .nav-dot, .nav-client-btn.active .nav-dot { background: var(--pink); }

/* ══ MAIN ══ */
.main {
  margin-left: var(--sidebar-w);
  flex: 1;
  position: relative; z-index: 1;
  display: flex; flex-direction: column;
  min-height: 100vh;
}

.topbar {
  position: sticky; top: 0; z-index: 50;
  background: rgba(8,3,22,0.94);
  border-bottom: 1px solid rgba(140,60,255,0.18);
  backdrop-filter: blur(12px);
  padding: 13px 30px;
  display: flex; align-items: center; justify-content: space-between; gap: 14px;
}
.topbar-title {
  font-family: 'Orbitron', monospace;
  font-size: 13px; font-weight: 700; letter-spacing: 3px;
  color: var(--lavender);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.topbar-tags { display: flex; gap: 6px; flex-wrap: wrap; }

.content-wrap { flex: 1; padding: 36px 32px 20px; max-width: 860px; }

/* ── WELCOME ── */
.welcome { text-align: center; padding: 72px 20px; }
.welcome-logo {
  font-family: 'Orbitron', monospace;
  font-size: clamp(30px, 5vw, 54px); font-weight: 900; letter-spacing: 6px;
  color: var(--pink); text-shadow: 0 0 16px rgba(224,64,251,0.8), 0 0 44px rgba(224,64,251,0.3);
  line-height: 1; animation: flicker 9s infinite;
}
.welcome-sub {
  font-family: 'Orbitron', monospace;
  font-size: clamp(8px,1.4vw,12px); letter-spacing: 13px;
  color: var(--dim); margin-top: 10px; text-transform: uppercase;
}
.hline {
  height: 1px;
  background: linear-gradient(90deg,transparent,var(--pink),var(--violet),var(--pink),transparent);
  box-shadow: 0 0 10px rgba(224,64,251,0.5);
  margin: 20px auto; max-width: 480px;
}
.welcome-hint { font-size: 11px; letter-spacing: 3px; color: var(--dim); text-transform: uppercase; margin-top: 10px; }

/* ── CLIENT VIEW ── */
.client-view { display: none; }
.client-view.active { display: block; }

.client-title {
  font-family: 'Orbitron', monospace;
  font-size: clamp(16px,2.5vw,26px); font-weight: 900; letter-spacing: 3px;
  color: var(--text); line-height: 1.2; margin-bottom: 10px;
}
.client-meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 18px; }

.launch-btn {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 11px 26px;
  background: linear-gradient(135deg,rgba(140,40,220,0.28),rgba(224,64,251,0.18));
  border: 1px solid rgba(200,80,255,0.48);
  border-radius: 3px;
  color: var(--pink);
  font-family: 'Orbitron', monospace; font-size: 10px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase;
  text-decoration: none; cursor: pointer;
  transition: all .17s;
  text-shadow: 0 0 8px rgba(224,64,251,0.5);
  box-shadow: 0 0 18px rgba(180,40,220,0.14);
  margin-bottom: 28px;
}
.launch-btn:hover {
  background: linear-gradient(135deg,rgba(180,60,255,0.46),rgba(224,64,251,0.33));
  border-color: var(--pink); box-shadow: 0 0 28px rgba(224,64,251,0.28); transform: translateY(-1px);
}

/* ── SAVE SECTIONS ── */
.save-section { margin-bottom: 26px; }
.section-heading {
  font-family: 'Orbitron', monospace; font-size: 9px; font-weight: 700;
  letter-spacing: 4px; text-transform: uppercase;
  color: var(--pink); text-shadow: 0 0 8px rgba(224,64,251,0.4);
  padding: 9px 14px; border-left: 3px solid var(--pink);
  background: rgba(224,64,251,0.04); margin-bottom: 12px;
  display: flex; align-items: center; gap: 10px;
}
.section-heading::after { content:''; flex:1; height:1px; background:linear-gradient(90deg,rgba(224,64,251,0.2),transparent); }

/* Server list */
.server-list { display: flex; flex-direction: column; gap: 7px; }
.server-item {
  display: flex; align-items: center; gap: 10px;
  background: var(--panel2); border: 1px solid var(--border); border-radius: 3px;
  padding: 9px 12px; transition: border-color .14s;
}
.server-item:hover { border-color: rgba(180,60,255,0.38); }
.item-icon {
  width: 34px; height: 34px; border-radius: 2px; flex-shrink: 0;
  background: rgba(120,40,200,0.2); border: 1px solid rgba(140,60,255,0.25);
  display: flex; align-items: center; justify-content: center; font-size: 16px;
}
.item-info { flex: 1; min-width: 0; }
.item-name { font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.item-sub  { font-size: 10px; color: var(--dim); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.remove-btn {
  background: none; border: 1px solid rgba(255,60,100,0.22); border-radius: 2px;
  color: rgba(255,80,100,0.45); padding: 3px 8px; font-size: 10px; cursor: pointer;
  transition: all .14s; font-family: inherit; flex-shrink: 0;
}
.remove-btn:hover { border-color: #ff5070; color: #ff7090; background: rgba(255,60,100,0.09); }

.add-row {
  display: flex; gap: 7px; margin-top: 9px; flex-wrap: wrap;
}
.field {
  flex: 1; min-width: 100px;
  background: rgba(14,5,36,0.8); border: 1px solid rgba(140,60,255,0.28); border-radius: 3px;
  color: var(--text); font-family: 'Share Tech Mono', monospace; font-size: 12px;
  padding: 7px 11px; outline: none; transition: border-color .14s;
}
.field:focus { border-color: rgba(220,100,255,0.65); }
.field::placeholder { color: var(--dim); }
.add-btn {
  background: rgba(120,40,200,0.18); border: 1px solid rgba(160,60,255,0.38); border-radius: 3px;
  color: var(--lavender); font-family: 'Share Tech Mono', monospace; font-size: 12px;
  padding: 7px 15px; cursor: pointer; transition: all .14s; white-space: nowrap;
}
.add-btn:hover { background: rgba(180,60,255,0.28); color: var(--pink); border-color: var(--pink); }

/* Skin */
.skin-panel { display: flex; gap: 18px; align-items: flex-start; flex-wrap: wrap; }
.skin-preview {
  width: 76px; height: 76px; border-radius: 3px; flex-shrink: 0;
  background: rgba(14,5,36,0.8); border: 1px solid rgba(140,60,255,0.28);
  display: flex; align-items: center; justify-content: center; font-size: 34px; overflow: hidden;
}
.skin-preview img { width:100%; height:100%; object-fit:contain; image-rendering:pixelated; }
.skin-controls { flex: 1; min-width: 180px; display: flex; flex-direction: column; gap: 7px; }

/* Empty state */
.empty { text-align:center; padding:18px; color:var(--dim); font-size:11px; letter-spacing:2px;
  border:1px dashed rgba(140,60,255,0.13); border-radius:3px; }

/* Tags */
.tag {
  font-family: 'Share Tech Mono', monospace; font-size: 9px; font-weight: 700;
  letter-spacing: 1.5px; text-transform: uppercase;
  padding: 2px 8px; border-radius: 2px; border: 1px solid; white-space: nowrap;
}
.t-wasm   { background:var(--wasm-bg);  color:var(--wasm-fg);  border-color:var(--wasm-bdr); }
.t-js     { background:var(--js-bg);    color:var(--js-fg);    border-color:var(--js-bdr); }
.t-unk    { background:var(--unk-bg);   color:var(--unk-fg);   border-color:var(--unk-bdr); }
.t-legit  { background:var(--legit-bg); color:var(--legit-fg); border-color:var(--legit-bdr); }
.t-hacked { background:var(--hacked-bg);color:var(--hacked-fg);border-color:var(--hacked-bdr); }
.t-modded { background:var(--modded-bg);color:var(--modded-fg);border-color:var(--modded-bdr); }

/* ══ IO BAR ══ */
.io-bar {
  position: sticky; bottom: 0; z-index: 50;
  background: rgba(6,2,18,0.97);
  border-top: 1px solid rgba(140,60,255,0.22);
  backdrop-filter: blur(14px);
  padding: 11px 28px;
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
}
.io-label { font-family:'Orbitron',monospace; font-size:8px; font-weight:700; letter-spacing:4px; color:var(--dim); white-space:nowrap; }
.io-btn {
  display: flex; align-items: center; gap: 7px;
  padding: 7px 16px; border-radius: 3px;
  font-family: 'Share Tech Mono', monospace; font-size: 11px; letter-spacing: 1px;
  cursor: pointer; transition: all .15s; border: 1px solid; white-space: nowrap;
}
.io-export-all  { background:rgba(124,77,255,0.13); border-color:rgba(124,77,255,0.42); color:#b39dff; }
.io-export-all:hover  { background:rgba(124,77,255,0.28); border-color:var(--violet); color:#fff; box-shadow:0 0 14px rgba(124,77,255,0.22); }
.io-export-cur  { background:rgba(180,60,255,0.1); border-color:rgba(200,80,255,0.35); color:var(--lavender); }
.io-export-cur:hover  { background:rgba(200,80,255,0.24); border-color:var(--pink); color:#fff; }
.io-import  { background:rgba(224,64,251,0.1); border-color:rgba(224,64,251,0.38); color:var(--pink); }
.io-import:hover  { background:rgba(224,64,251,0.24); border-color:var(--pink); color:#fff; box-shadow:0 0 14px rgba(224,64,251,0.22); }
.io-clear   { background:rgba(255,60,100,0.07); border-color:rgba(255,60,100,0.28); color:rgba(255,80,100,0.65); margin-left:auto; }
.io-clear:hover   { background:rgba(255,60,100,0.18); border-color:#ff5070; color:#ff7090; }
#file-import { display:none; }

/* Toast */
.toast {
  position:fixed; bottom:72px; right:24px;
  background:rgba(18,6,42,0.97); border:1px solid rgba(224,64,251,0.38); border-radius:4px;
  padding:11px 18px; font-size:12px; color:var(--lavender); letter-spacing:1px;
  z-index:999; opacity:0; transform:translateY(8px);
  transition:opacity .22s, transform .22s; pointer-events:none;
  box-shadow:0 4px 20px rgba(160,40,210,0.24);
}
.toast.show { opacity:1; transform:translateY(0); }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(140,60,255,0.28); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(200,80,255,0.48); }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>
<div class="bg-scan"></div>

<!-- SIDEBAR -->
<nav class="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">EAGLERCRAFT</div>
    <div class="sidebar-sub">// launcher //</div>
  </div>
  <div class="sidebar-nav" id="sidebarNav"></div>
</nav>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <div class="topbar-title" id="topbarTitle">Select a client</div>
    <div class="topbar-tags" id="topbarTags"></div>
  </div>

  <div class="content-wrap">
    <div id="welcome" class="welcome">
      <div class="welcome-logo">EAGLERCRAFT</div>
      <div class="welcome-sub">Launcher</div>
      <div class="hline"></div>
      <div class="welcome-hint">&#8592; choose a client from the sidebar</div>
    </div>
    <div id="clientViews"></div>
  </div>

  <!-- IO BAR -->
  <div class="io-bar">
    <span class="io-label">Save Data</span>
    <button class="io-btn io-export-all" onclick="exportAll()">&#11015; Export All</button>
    <button class="io-btn io-export-cur" id="btnExportCur" onclick="exportCurrent()" style="display:none">&#11015; Export <span id="exportName">Client</span></button>
    <button class="io-btn io-import" onclick="document.getElementById('file-import').click()">&#11014; Import</button>
    <input type="file" id="file-import" accept=".json" onchange="importData(event)">
    <button class="io-btn io-clear" id="btnClear" onclick="clearCurrent()" style="display:none">&#10005; Clear Current</button>
  </div>
</div>

<div class="toast" id="toast"></div>

  {id:'188-xu',  ver:'1.8.8', name:'EaglercraftX 1.8 u53 Signed',engine:'unk', type:'legit',  url:'1.8.8/Legit/EaglercraftX_1.8_u53_Offline_Signed.html'},
  {id:'188-rc',  ver:'1.8.8', name:'ResentClient 5.0',           engine:'wasm',type:'legit',  url:'1.8.8/Legit/ResentClient_5.0_WASM.html'},
  {id:'188-sl',  ver:'1.8.8', name:'StarLike Client 0.4.2',      engine:'unk', type:'modded', url:'1.8.8/Modded/Eaglercraft_IR_StarLikeClient_0.4.2.html'},
  {id:'188-ef',  ver:'1.8.8', name:'EaglerForge',                engine:'unk', type:'modded', url:'1.8.8/Modded/Eaglerforge.html'},
];

/* ════════════════════════════════════
   STORAGE — per client
════════════════════════════════════ */
const SK = 'eagler_launcher_v1';
function loadAll()        { try { return JSON.parse(localStorage.getItem(SK))||{}; } catch { return {}; } }
function saveAll(d)       { localStorage.setItem(SK, JSON.stringify(d)); }
function getCD(id)        {
  const all = loadAll();
  if (!all[id]) all[id] = {servers:[], skin:{name:'Player',url:''}, worlds:[]};
  return all[id];
}
function setCD(id, data)  { const all=loadAll(); all[id]=data; saveAll(all); }

/* ════════════════════════════════════
   STATE
════════════════════════════════════ */
let currentId = null;

/* ════════════════════════════════════
   SIDEBAR
════════════════════════════════════ */
function buildSidebar() {
  const nav = document.getElementById('sidebarNav');
  const versions = [...new Set(CLIENTS.map(c=>c.ver))];

  versions.forEach(ver => {
    const group = document.createElement('div');
    group.className = 'nav-group';

    const btn = document.createElement('button');
    btn.className = 'nav-ver-btn';
    btn.innerHTML = `<span>&#9654; v${ver}</span><span class="chevron">&#9654;</span>`;

    const list = document.createElement('div');
    list.className = 'nav-clients';

    const clients = CLIENTS.filter(c => c.ver === ver);
    const types   = [...new Set(clients.map(c => c.type))];

    types.forEach(type => {
      if (types.length > 1) {
        const lbl = document.createElement('div');
        lbl.className = 'nav-sub-label';
        lbl.textContent = type==='legit' ? '✅ Legit' : type==='hacked' ? '💀 Hacked' : '🔧 Modded';
        list.appendChild(lbl);
      }
      clients.filter(c=>c.type===type).forEach(client => {
        const cb = document.createElement('button');
        cb.className = 'nav-client-btn';
        cb.dataset.id = client.id;
        cb.title = client.name;
        cb.innerHTML = `<span class="nav-dot"></span>${client.name}`;
        cb.onclick = () => selectClient(client.id);
        list.appendChild(cb);
      });
    });

    btn.onclick = () => {
      const wasOpen = list.classList.contains('open');
      document.querySelectorAll('.nav-clients.open').forEach(el => el.classList.remove('open'));
      document.querySelectorAll('.nav-ver-btn.open').forEach(el => el.classList.remove('open'));
      if (!wasOpen) { list.classList.add('open'); btn.classList.add('open'); }
    };

    group.appendChild(btn);
    group.appendChild(list);
    nav.appendChild(group);
  });

  // open first
  const fb = nav.querySelector('.nav-ver-btn');
  const fl = nav.querySelector('.nav-clients');
  if (fb && fl) { fb.classList.add('open'); fl.classList.add('open'); }
}

/* ════════════════════════════════════
   CLIENT VIEWS
════════════════════════════════════ */
function buildViews() {
  const c = document.getElementById('clientViews');
  CLIENTS.forEach(client => {
    const d = document.createElement('div');
    d.className = 'client-view';
    d.id = 'view-'+client.id;
    d.innerHTML = viewHTML(client);
    c.appendChild(d);
  });
}

function etag(e) {
  if(e==='wasm') return '<span class="tag t-wasm">WASM</span>';
  if(e==='js')   return '<span class="tag t-js">JS</span>';
  return '<span class="tag t-unk">Unknown</span>';
}
function ttag(t) {
  if(t==='legit')  return '<span class="tag t-legit">Legit</span>';
  if(t==='hacked') return '<span class="tag t-hacked">Hacked</span>';
  return '<span class="tag t-modded">Modded</span>';
}

function viewHTML(client) {
  const id = client.id;
  return `
  <div class="client-title">${client.name}</div>
  <div class="client-meta">${etag(client.engine)} ${ttag(client.type)} <span style="color:var(--dim);font-size:10px;letter-spacing:2px">v${client.ver}</span></div>
  <a class="launch-btn" href="${client.url}" target="_blank">&#9654; Launch Client</a>

  <div class="save-section">
    <div class="section-heading">&#127edException; Servers</div>
    <div class="server-list" id="svr-${id}"></div>
    <div class="add-row" style="margin-top:9px">
      <input class="field" id="sn-${id}" placeholder="Server name…">
      <input class="field" id="sa-${id}" placeholder="address:port">
      <button class="add-btn" onclick="addServer('${id}')">+ Add</button>
    </div>
  </div>

  <div class="save-section">
    <div class="section-heading">&#127257; Skin &amp; Name</div>
    <div class="skin-panel">
      <div class="skin-preview" id="skprev-${id}">&#129408;</div>
      <div class="skin-controls">
        <input class="field" id="skname-${id}" type="text" placeholder="Username…" oninput="saveSkin('${id}')">
        <input class="field" id="skurl-${id}"  type="text" placeholder="Skin image URL or data:image/png;base64,…" oninput="saveSkin('${id}')">
        <button class="add-btn" onclick="saveSkin('${id}')">Save</button>
      </div>
    </div>
  </div>

  <div class="save-section">
    <div class="section-heading">&#127758; Worlds</div>
    <div class="world-list" id="wld-${id}"></div>
    <div class="add-row" style="margin-top:9px">
      <input class="field" id="wn-${id}" placeholder="World name…">
      <button class="add-btn" onclick="addWorld('${id}')">+ Add</button>
    </div>
  </div>`;
}

/* ════════════════════════════════════
   SELECT CLIENT
════════════════════════════════════ */
function selectClient(id) {
  currentId = id;
  const client = CLIENTS.find(c=>c.id===id);

  document.querySelectorAll('.nav-client-btn').forEach(b=>b.classList.remove('active'));
  const ab = document.querySelector(`.nav-client-btn[data-id="${id}"]`);
  if(ab) {
    ab.classList.add('active');
    // make sure its version group is open
    const list = ab.closest('.nav-clients');
    const btn  = list && list.previousElementSibling;
    if(list && !list.classList.contains('open')) {
      document.querySelectorAll('.nav-clients.open').forEach(el=>el.classList.remove('open'));
      document.querySelectorAll('.nav-ver-btn.open').forEach(el=>el.classList.remove('open'));
      list.classList.add('open');
      if(btn) btn.classList.add('open');
    }
  }

  document.getElementById('topbarTitle').textContent = client.name + ' — v' + client.ver;
  document.getElementById('topbarTags').innerHTML = etag(client.engine)+' '+ttag(client.type);
  document.getElementById('welcome').style.display = 'none';
  document.querySelectorAll('.client-view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+id).classList.add('active');
  document.getElementById('btnExportCur').style.display = 'inline-flex';
  document.getElementById('btnClear').style.display = 'inline-flex';
  document.getElementById('exportName').textContent = client.name;

  renderData(id);
}

/* ════════════════════════════════════
   RENDER
════════════════════════════════════ */
function renderData(id) {
  const d = getCD(id);

  // servers
  const sl = document.getElementById('svr-'+id);
  sl.innerHTML = d.servers.length ? d.servers.map((s,i)=>`
    <div class="server-item">
      <div class="item-icon">&#127edException;</div>
      <div class="item-info">
        <div class="item-name">${esc(s.name)}</div>
        <div class="item-sub">${esc(s.addr)}</div>
      </div>
      <button class="remove-btn" onclick="rmServer('${id}',${i})">&#10005;</button>
    </div>`).join('') : '<div class="empty">No servers added yet</div>';

  // skin
  const ni = document.getElementById('skname-'+id);
  const ui = document.getElementById('skurl-'+id);
  if(ni) ni.value = d.skin.name||'Player';
  if(ui) ui.value = d.skin.url||'';
  updateSkinPreview(id, d.skin.url||'');

  // worlds
  const wl = document.getElementById('wld-'+id);
  wl.innerHTML = d.worlds.length ? d.worlds.map((w,i)=>`
    <div class="server-item">
      <div class="item-icon">&#127758;</div>
      <div class="item-info">
        <div class="item-name">${esc(w.name)}</div>
        <div class="item-sub">${w.date}</div>
      </div>
      <button class="remove-btn" onclick="rmWorld('${id}',${i})">&#10005;</button>
    </div>`).join('') : '<div class="empty">No worlds saved yet</div>';
}

function updateSkinPreview(id, url) {
  const p = document.getElementById('skprev-'+id);
  if(!p) return;
  if(url) p.innerHTML = `<img src="${esc(url)}" alt="skin" onerror="this.parentElement.innerHTML='&#129408;'">`;
  else    p.innerHTML = '&#129408;';
}

/* ════════════════════════════════════
   CRUD
════════════════════════════════════ */
function addServer(id) {
  const n = document.getElementById('sn-'+id).value.trim();
  const a = document.getElementById('sa-'+id).value.trim();
  if(!n && !a) return;
  const d = getCD(id);
  d.servers.push({name: n||'Server', addr: a||'localhost:8081'});
  setCD(id,d);
  document.getElementById('sn-'+id).value='';
  document.getElementById('sa-'+id).value='';
  renderData(id); toast('Server added ✓');
}
function rmServer(id,i) {
  const d=getCD(id); d.servers.splice(i,1); setCD(id,d); renderData(id);
}
function saveSkin(id) {
  const d=getCD(id);
  d.skin.name = document.getElementById('skname-'+id).value;
  d.skin.url  = document.getElementById('skurl-'+id).value;
  setCD(id,d); updateSkinPreview(id,d.skin.url);
  toast('Skin saved ✓');
}
function addWorld(id) {
  const n = document.getElementById('wn-'+id).value.trim();
  if(!n) return;
  const d = getCD(id);
  d.worlds.push({name:n, date: new Date().toLocaleDateString()});
  setCD(id,d);
  document.getElementById('wn-'+id).value='';
  renderData(id); toast('World added ✓');
}
function rmWorld(id,i) {
  const d=getCD(id); d.worlds.splice(i,1); setCD(id,d); renderData(id);
}

/* ════════════════════════════════════
   IMPORT / EXPORT
════════════════════════════════════ */
function exportAll() {
  dl(JSON.stringify({version:1,scope:'all',data:loadAll()},null,2), 'eagler-all-clients.json');
  toast('Exported all client data ✓');
}
function exportCurrent() {
  if(!currentId) return;
  const client = CLIENTS.find(c=>c.id===currentId);
  dl(JSON.stringify({version:1,scope:'single',clientId:currentId,clientName:client.name,data:getCD(currentId)},null,2),
    `eagler-${currentId}.json`);
  toast('Exported '+client.name+' ✓');
}
function importData(e) {
  const file = e.target.files[0];
  if(!file) return;
  const r = new FileReader();
  r.onload = ev => {
    try {
      const j = JSON.parse(ev.target.result);
      if(j.version!==1) throw new Error('Unknown version');
      if(j.scope==='all') {
        const all = loadAll(); Object.assign(all, j.data); saveAll(all);
        toast('Imported all clients ✓');
      } else if(j.scope==='single' && j.clientId && j.data) {
        setCD(j.clientId, j.data);
        toast('Imported '+(j.clientName||j.clientId)+' ✓');
      } else throw new Error('Bad format');
      if(currentId) renderData(currentId);
    } catch(err) { toast('Import failed: '+err.message); }
  };
  r.readAsText(file);
  e.target.value='';
}
function clearCurrent() {
  if(!currentId) return;
  if(!confirm('Clear all saved data for this client?')) return;
  const all=loadAll(); delete all[currentId]; saveAll(all);
  renderData(currentId); toast('Client data cleared');
}
function dl(txt, filename) {
  const blob = new Blob([txt],{type:'application/json'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href=url; a.download=filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

/* ════════════════════════════════════
   HELPERS
════════════════════════════════════ */
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
let tt=null;
function toast(msg) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(tt); tt=setTimeout(()=>el.classList.remove('show'),2600);
}

/* ════════════════════════════════════
   INIT
════════════════════════════════════ */
buildSidebar();
buildViews();
</script>
</body>
</html>
